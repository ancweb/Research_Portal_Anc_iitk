version: '3.9'

# ─── Research Portal — Docker Compose ────────────────────────────────────────
# Starts the Go backend (port 5000) and a PostgreSQL database (port 5432).
#
# Quick start:
#   1. cp .env.example .env          # fill in your secrets
#   2. docker compose up --build     # first run
#   3. docker compose up -d          # subsequent runs (detached)
#
# The frontend runs separately with:
#   cd frontend && npm run dev       # http://localhost:3000
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: research_portal_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-research_portal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose PostgreSQL on the host so you can connect with psql / DBeaver
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-research_portal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go Backend ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: research_portal_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database — points to the postgres service by its service name
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-research_portal}
      DB_SSLMODE: disable

      # Auth
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}

      # Default admin seeded on first boot (only when the users table is empty)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@iitk.ac.in}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}

      # Server
      PORT: 5000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    ports:
      # Backend is accessible on localhost:5000 — exactly what the frontend expects
      - "5000:5000"

volumes:
  postgres_data:
    driver: local
